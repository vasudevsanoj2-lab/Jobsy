<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Send Reply</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

    body {
        margin: 0;
        padding: 40px;
        font-family: "Poppins", sans-serif;
        background: #eef2f6;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        color: #333;
    }

    .container {
        width: 95%;
        max-width: 600px;
        background: #ffffff;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.10);
        border: 1px solid #dfe5ec;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 30px;
        font-weight: 600;
        color: #1a3b5d;
        letter-spacing: 0.5px;
    }

    label {
        font-size: 15px;
        font-weight: 600;
        color: #1a3b5d;
        margin-bottom: 8px;
        display: block;
    }

    textarea {
        width: 100%;
        height: 150px;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #dfe5ec;
        font-size: 14px;
        outline: none;
        resize: none;
        transition: 0.25s;
        background: #f9fcff;
    }

    textarea:focus {
        border-color: #1a3b5d;
        box-shadow: 0 0 6px rgba(26,59,93,0.4);
    }

    .submit-btn {
        margin-top: 20px;
        width: 100%;
        padding: 12px;
        font-size: 15px;
        font-weight: 600;
        color: white;
        background: #1a3b5d;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.25s;
    }

    .submit-btn:hover {
        background: #15324a;
    }

</style>

</head>

<body>

<div class="container">
    <h2>Send Reply</h2>

    <form method="post" action="/send_reply_post">
        {% csrf_token %}

        <label for="reply">Your Reply</label>
        <textarea name="textarea" id="reply" placeholder="Enter your reply..." required></textarea>

        <button type="submit" class="submit-btn">Submit Reply</button>
    </form>
</div>

</body>
</html>
