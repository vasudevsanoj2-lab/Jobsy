<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Blue Login Page</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to bottom right, #0077B6,#083a55,#0077B6);
        background-size: 300% 300%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        animation: smoothGradient 5s ease-in-out infinite;
    }
    img {
        background: transparent;
    }

    @keyframes smoothGradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .login-box {
        background: white;
        width: 420px; /* bigger box */
        padding: 40px; /* increased padding */
        border-radius: 14px;
        box-shadow: 0px 0px 22px rgba(0,0,0,0.25);
        text-align: center;
        margin-top: 15px;
    }

    .login-logo {
        width: 120px;
        margin-bottom: 15px;
    }

    h2 {
        text-align: center;
        color: #007BFF;
        margin-bottom: 25px;
        font-size: 26px;
    }

    label {
        font-size: 15px;
        color: #333;
        display: block;
        text-align: left;
        margin-top: 10px;
    }

    input {
        width: 95%;
        padding: 12px;
        border: 1px solid #87CEFA;
        border-radius: 6px;
        margin-top: 5px;
        margin-bottom: 18px;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 14px;
        background: #007BFF;
        border: none;
        color: white;
        border-radius: 6px;
        font-size: 17px;
        cursor: pointer;
    }

    button:hover {
        background: #005bb5;
    }

    .register {
        text-align: center;
        margin-top: 15px;
    }

    .register a {
        color: #005bb5;
        text-decoration: none;
        font-size: 15px;
    }

    .register a:hover {
        text-decoration: underline;
    }

    .image img {
        height: 300px;
        margin-bottom: 10px;
    }
</style>

</head>
<body>

<div class="image">
    <img src="static/images/bgg-ss.png" alt="img">
</div>

<div class="login-box">

    <h2>Login</h2>

    <form action="login_post" method="post">
        <label>Username</label>
        <input type="text" name="textfield" placeholder="Enter Username"  />

        <label>Password</label>
        <input type="password" name="textfield2" placeholder="Enter Password"/>
        <button type="submit">Login</button>
    </form>

    <div class="register">
        <p>
            Don't have an account? <br>
            <a href="worker_registration">Worker Register here</a><br>
            <a href="user_registration">User Register here</a>
        </p>
    </div>
</div>

</body>
</html>
