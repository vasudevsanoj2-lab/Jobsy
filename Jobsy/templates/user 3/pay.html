<!DOCTYPE html>
<html>
<head>
    <title>Request Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: "Poppins", sans-serif;
            background: #eef2f6;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* ==============================
           BACK BUTTON – TOP LEFT
        ============================== */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: #103b78;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(16,59,120,0.25);
            transition: 0.25s ease;
            z-index: 999;
        }

        .back-btn:hover {
            background: #0b63c7;
            transform: translateY(-2px);
        }

        .container {
            width: 430px;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #dbe3ec;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h2 {
            color: #103b78;
            margin-bottom: 25px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<!-- BACK BUTTON -->
<a href="javascript:history.back()" class="back-btn">&larr; Back</a>

<div class="container">

    <h2>Pay ₹{{ amount }} for your request</h2>

    <form action="{% url 'request_payment_success' %}" method="POST">
        {% csrf_token %}
        <input type="hidden" name="request_id" value="{{ request_obj.id }}">

        <script
            src="https://checkout.razorpay.com/v1/checkout.js"
            data-key="{{ razorpay_key }}"
            data-amount="{{ payment.amount }}"
            data-currency="INR"
            data-order_id="{{ payment.id }}"
            data-buttontext="Pay Now"
            data-name="AgroShop"
            data-description="Request Payment"
            data-theme.color="#103b78">
        </script>
    </form>

</div>

</body>
</html>
