<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Rating & Review</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 40px;
        font-family: "Poppins", sans-serif;
        background: #eef2f6;
        display: flex;
        justify-content: center;
    }

    /* ==============================
       BACK BUTTON ? TOP LEFT
    ============================== */
    .back-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 8px 16px;
        background: #103b78;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        border-radius: 10px;
        text-decoration: none;
        box-shadow: 0 4px 12px rgba(16,59,120,0.25);
        transition: 0.25s ease;
        z-index: 999;
    }

    .back-btn:hover {
        background: #0b63c7;
        transform: translateY(-2px);
    }

    /* ==============================
       HOME BUTTON ? TOP RIGHT
    ============================== */
    .home-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 10px 22px;
        background: #103b78;
        color: #ffffff;
        font-size: 16px;
        font-weight: 600;
        border-radius: 12px;
        text-decoration: none;
        box-shadow: 0 4px 14px rgba(16,59,120,0.3);
        transition: 0.25s ease;
        z-index: 999;
        display: flex;
        align-items: center;
        gap: 8px;
        letter-spacing: 0.5px;
    }

    .home-btn:hover {
        background: #0b63c7;
        transform: translateY(-2px);
    }

    .home-icon {
        font-size: 18px;
        line-height: 1;
    }

    /* ==============================
       FORM CONTAINER
    ============================== */
    .container {
        width: 400px;
        background: #ffffff;
        padding: 25px 30px;
        border-radius: 16px;
        border: 1px solid #dbe3ec;
        box-shadow: 0 5px 25px rgba(0,0,0,0.08);
    }

    .label {
        color: #103b78;
        font-weight: 600;
        width: 120px;
    }

    input[type="number"], textarea {
        width: 95%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #c7d4e2;
        outline: none;
        font-size: 15px;
    }

    input[type="number"]:focus, textarea:focus {
        border-color: #103b78;
        box-shadow: 0 0 5px rgba(16,59,120,0.3);
    }

    input[type="submit"] {
        background: #103b78;
        color: white;
        padding: 10px 25px;
        border: none;
        border-radius: 8px;
        width: 100%;
        font-weight: 600;
        cursor: pointer;
        transition: 0.25s;
    }

    input[type="submit"]:hover {
        background: #0b63c7;
        transform: translateY(-2px);
    }

    .center {
        text-align: center;
        padding-top: 10px;
    }
</style>
</head>

<body>

<!-- BACK BUTTON -->
<a href="{% url 'view_request_status_user' %}" class="back-btn">&larr; Back</a>

<!-- HOME BUTTON -->
<a href="{% url 'user_page' %}" class="home-btn">
    <span class="home-icon">&#8962;</span> HOME
</a>

<div class="container">
<form method="post" action="/send_rating_post">
    {% csrf_token %}
    <table>

        <tr>
            <td class="label">Rating</td>
            <td>
                <input type="number" name="textfield7" min="1" max="5"
                       required="required" pattern="^[1-5]$" />
            </td>
        </tr>

        <tr>
            <td class="label">Review</td>
            <td><textarea name="textarea2"></textarea></td>
        </tr>

        <tr>
            <td colspan="2" class="center">
                <input type="submit" value="Send" />
            </td>
        </tr>

    </table>
</form>
</div>

</body>
</html>
