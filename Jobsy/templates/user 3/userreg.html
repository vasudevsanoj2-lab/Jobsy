{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Registration</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-image: url("{% static 'images/user.jpg' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    /* NAVBAR */
    .navbar {
        width: 100%;
        height: 60px;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        padding: 0 20px;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1000;
    }

    .navbar a {
        color: #ffffff;
        text-decoration: none;
        font-size: 15px;
        font-weight: bold;
    }

    .navbar a:hover {
        text-decoration: underline;
    }

    /* OVERLAY */
    .overlay {
        background: rgba(0, 0, 0, 0.55);
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding-top: 60px; /* space for navbar */
    }

    /* FORM BOX */
    .form-box {
        width: 400px;
        background: rgba(255, 255, 255, 0.90);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 25px rgba(0, 0, 0, 0.3);
        height: 790px;
    }

    .form-box h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #003049;
    }

    input {
        width: 93%;
        padding: 12px;
        margin: 18px 0;
        border-radius: 8px;
        border: 1px solid #555;
        font-size: 15px;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        color: white;
        background-color: #0077B6;
        cursor: pointer;
    }

    button:hover {
        background-color: #005f8d;
    }
</style>

</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="{% url 'login' %}">← Back to Login</a>
</div>

<!-- PAGE CONTENT -->
<div class="overlay">
    <div class="form-box">
        <h2>User Registration</h2>

        <form method="post" action="/user_registration_post" enctype="multipart/form-data">
            {% csrf_token %}

            <input type="text" name="textfield" placeholder="Name" required pattern="[A-Z a-z.]{3,25}" />
            <input type="text" name="textfield2" placeholder="Email" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3}" />
            <input type="text" name="textfield3" placeholder="Phone Number" required pattern="[6789][0-9]{9}" />
            <input type="text" name="textfield4" placeholder="Place" required pattern="[A-Z a-z.]{3,25}" />
            <input type="text" name="textfield5" placeholder="Post" required pattern="[A-Z a-z.]{3,25}" />
            <input type="text" name="textfield6" placeholder="PIN Code" required pattern="[0-9]{6}" />
            <input type="file" name="file" required />
            <input type="text" name="textfield7" placeholder="Username" required pattern="[A-Z a-z 0-9]{3,25}" />
            <input type="password" name="textfield8" placeholder="Password" required
                   pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                   title="Must contain at least one number, one uppercase and lowercase letter, and at least 8 characters" />

            <button type="submit">Register</button>
        </form>

    </div>
</div>

</body>
</html>
