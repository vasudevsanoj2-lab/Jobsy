<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View Complaint Reply</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

    body {
        margin: 0;
        padding: 40px;
        font-family: "Poppins", sans-serif;
        background: #f2f5f9;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        color: #333;
    }

    /* ==============================
       BACK BUTTON – TOP LEFT
    ============================== */
    .back-btn {
        position: fixed;
        top: 25px;
        left: 30px;
        padding: 10px 18px;
        background: #1e3e79;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        border-radius: 10px;
        text-decoration: none;
        box-shadow: 0 4px 12px rgba(30,62,121,0.25);
        transition: 0.25s ease;
        z-index: 999;
    }

    .back-btn:hover {
        background: #162f5e;
        transform: translateY(-2px);
    }

    .container {
        width: 95%;
        max-width: 900px;
        background: linear-gradient(135deg, #e8f1ff, #d4e3f7);
        border-radius: 16px;
        padding: 25px;
        box-shadow: 0 5px 20px rgba(0, 76, 145, 0.15);
        border: 1px solid #c7d8ee;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 30px;
        font-weight: 600;
        color: #1e3e79;
        letter-spacing: 0.5px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        overflow: hidden;
        border-radius: 12px;
        background: #ffffff;
    }

    th {
        background: #1e3e79;
        color: #ffffff;
        padding: 14px;
        text-align: left;
        font-size: 14px;
        text-transform: uppercase;
        font-weight: 600;
        border-bottom: 3px solid #4da3ff;
    }

    td {
        padding: 12px;
        font-size: 14px;
        border-bottom: 1px solid #e4e8ed;
        color: #333;
    }

    tr:hover {
        background: #eef5ff;
        transition: 0.25s;
    }

</style>
</head>

<body>

<!-- BACK BUTTON -->
<a href="{% url 'user_page' %}" class="back-btn">← Back</a>

<div class="container">

    <h2>Complaint & Reply Details</h2>

    <table>
        <tr>
            <th>Complaint</th>
            <th>Reply</th>
            <th>Date</th>
        </tr>

        {% for i in value %}
        <tr>
            <td>{{ i.complaint }}</td>
            <td>{{ i.reply }}</td>
            <td>{{ i.date }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
