<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>User Complaints</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 40px;
        font-family: "Poppins", sans-serif;
        background: #f8f4e8; /* same cream background */
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        color: #333;
    }

    /* ==============================
       BACK BUTTON ? TOP LEFT
    ============================== */
    .back-btn {
        position: fixed;
        top: 25px;
        left: 30px;
        padding: 10px 18px;
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        border-radius: 10px;
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(15,143,143,0.35);
        transition: 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 1000;
    }

    .back-btn:hover {
        background: linear-gradient(90deg, #0d7c7c, #119c9c);
        transform: translateY(-2px);
    }

    .back-btn span {
        font-size: 18px;
        line-height: 1;
    }

    /* ==============================
       CONTAINER
    ============================== */
    .container {
        width: 90%;
        max-width: 900px;
        background: #ffffff;
        padding: 25px 30px;
        border-radius: 16px;
        border: 1px solid #e6dfd3;
        box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }

    h2 {
        margin-top: 0;
        margin-bottom: 20px;
        color: #0f8f8f;
        text-align: center;
        font-weight: 600;
    }

    /* ==============================
       TABLE STYLES
    ============================== */
    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }

    th, td {
        padding: 12px 14px;
        text-align: left;
        vertical-align: top;
    }

    th {
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        color: #ffffff;
        font-weight: 600;
    }

    tr:nth-child(even) {
        background: #fdfaf3;
    }

    tr:hover {
        background: #f1fbfb;
    }

    td {
        border-bottom: 1px solid #e6dfd3;
    }

    /* ==============================
       ACTION BUTTON
    ============================== */
    .reply-btn {
        display: inline-block;
        padding: 6px 14px;
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        color: #ffffff;
        text-decoration: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        transition: 0.25s;
        box-shadow: 0 3px 10px rgba(15,143,143,0.3);
    }

    .reply-btn:hover {
        background: linear-gradient(90deg, #0d7c7c, #119c9c);
        transform: translateY(-1px);
    }

    /* ==============================
       EMPTY STATE
    ============================== */
    .empty {
        text-align: center;
        padding: 20px;
        color: #888;
        font-style: italic;
    }
</style>
</head>

<body>

<!-- BACK BUTTON -->
<a href="{% url 'worker_page' %}" class="back-btn">
    <span>&larr;</span> Back
</a>

<div class="container">
    <h2>User Complaints</h2>

    <form id="form1" name="form1" method="post" action="">
        <table>
            <tr>
                <th>User Name</th>
                <th>Complaint</th>
                <th>Reply</th>
                <th>Action</th>
            </tr>

            {% for i in value %}
            <tr>
                <td>{{ i.user_id.name }}</td>
                <td>{{ i.complaint }}</td>
                <td>
                    {% if i.reply %}
                        {{ i.reply }}
                    {% else %}
                        <span style="color:#999;">Not replied yet</span>
                    {% endif %}
                </td>
                <td>
                    <a href="/incomingreplyworker/{{ i.id }}" class="reply-btn">
                        Reply
                    </a>
                </td>
            </tr>
            {% endfor %}

            {% if value|length == 0 %}
            <tr>
                <td colspan="4" class="empty">No complaints available</td>
            </tr>
            {% endif %}
        </table>
    </form>
</div>

</body>
</html>
