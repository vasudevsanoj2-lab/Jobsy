<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Manage Skills</title>

<style>
    body {
        margin: 0;
        padding: 40px;
        font-family: "Segoe UI", Arial, sans-serif;

        /* Soft Cream Texture Background */
        background: #f5f0e6;
        background-image:
            radial-gradient(circle at 20% 20%, rgba(255,255,255,0.6) 0, transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(255,255,255,0.5) 0, transparent 45%);
        background-attachment: fixed;
    }

    /* ==============================
       BACK BUTTON â TOP LEFT
    ============================== */
    .back-btn {
        position: fixed;
        top: 25px;
        left: 30px;
        padding: 10px 18px;
        background: #0f8f8f;
        color: #ffffff;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(15, 143, 143, 0.35);
        transition: 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 999;
    }

    .back-btn:hover {
        background: #0c6f6f;
        transform: translateY(-2px);
    }

    .back-arrow {
        font-size: 18px;
        line-height: 1;
    }

    .wrapper {
        width: 90%;
        max-width: 700px;
        background: rgba(255, 255, 255, 0.5);
        padding: 30px;
        margin: auto;
        border-radius: 15px;
        backdrop-filter: blur(6px);
        box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.15);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 28px;
        color: #0f3f3f;
        font-weight: 700;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 20px;
        box-shadow: 0px 3px 15px rgba(0,0,0,0.17);
    }

    th {
        padding: 14px;
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        color: white;
        font-size: 15px;
        text-align: left;
        letter-spacing: 0.5px;
    }

    td {
        padding: 12px;
        border-bottom: 1px solid #ececec;
        color: #333;
    }

    tr:hover td {
        background: #f1faf9;
        transition: 0.3s;
    }

    tr:last-child td {
        border-bottom: none;
    }

    /* Buttons */
    .btn {
        padding: 6px 14px;
        border-radius: 8px;
        text-decoration: none;
        color: white;
        font-size: 13px;
        font-weight: 600;
        display: inline-block;
        transition: 0.3s;
    }

    .edit-btn {
        background: #1a8f6a;
    }

    .edit-btn:hover {
        background: #167a5b;
    }

    .del-btn {
        background: #d9534f;
        margin-left: 5px;
    }

    .del-btn:hover {
        background: #b94744;
    }

    .add-btn {
        display: block;
        width: 180px;
        margin: 20px auto 0;
        background: #0f8f8f;
        color: white;
        padding: 12px;
        text-align: center;
        border-radius: 10px;
        font-size: 15px;
        text-decoration: none;
        font-weight: 600;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
        transition: 0.3s;
    }

    .add-btn:hover {
        background: #0c6f6f;
    }
</style>
</head>

<body>

<!-- BACK BUTTON (GOES TO WORKER PAGE) -->
<a href="{% url 'worker_page' %}" class="back-btn">
    <span class="back-arrow">&#8592;</span>
    Back
</a>

<div class="wrapper">
    <h2>Manage Skills</h2>

    <table>
        <tr>
            <th>Skill</th>
            <th>Experience</th>
            <th>Action</th>
        </tr>

        {% for i in val %}
        <tr>
            <td>{{ i.skill }}</td>
            <td>{{ i.experience }}</td>
            <td>
                <a href="/edit_skill/{{ i.id }}" class="btn edit-btn">Edit</a>
                <a href="/delete_skill/{{ i.id }}" class="btn del-btn">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <a href="/add_new" class="add-btn">+ Add New Skill</a>
</div>

</body>
</html>
