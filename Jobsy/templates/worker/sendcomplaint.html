<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Send Complaint</title>

<style>
    body {
        margin: 0;
        padding: 40px;
        font-family: "Segoe UI", Arial, sans-serif;

        background: #f5f0e6;
        background-image:
            radial-gradient(circle at 20% 20%, rgba(255,255,255,0.6) 0, transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(255,255,255,0.5) 0, transparent 45%);
        background-attachment: fixed;
    }

    /* ==============================
       BACK BUTTON â TOP LEFT
    ============================== */
    .back-btn {
        position: fixed;
        top: 25px;
        left: 30px;
        padding: 10px 18px;
        background: #0f8f8f;
        color: #ffffff;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(15, 143, 143, 0.35);
        transition: 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 1000;
    }

    .back-btn:hover {
        background: #0c6f6f;
        transform: translateY(-2px);
    }

    .back-arrow {
        font-size: 18px;
        line-height: 1;
    }

    /* ==============================
       HOME BUTTON â SAME AS BACK
    ============================== */
    .home-btn {
        position: fixed;
        top: 25px;
        right: 30px;
        padding: 10px 18px;
        background: #0f8f8f;              /* SAME COLOR */
        color: #ffffff;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(15, 143, 143, 0.35); /* SAME SHADOW */
        transition: 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 1000;
    }

    .home-btn:hover {
        background: #0c6f6f;              /* SAME HOVER */
        transform: translateY(-2px);
    }

    .home-icon {
        font-size: 16px;
        line-height: 1;
    }

    .wrapper {
        width: 90%;
        max-width: 550px;
        background: rgba(255, 255, 255, 0.5);
        padding: 30px;
        margin: auto;
        border-radius: 15px;
        backdrop-filter: blur(6px);
        box-shadow: 0px 4px 20px rgba(0,0,0,0.15);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 28px;
        color: #0f3f3f;
        font-weight: 700;
    }

    label {
        font-weight: 600;
        color: #0f3f3f;
        font-size: 15px;
    }

    textarea {
        width: 100%;
        height: 130px;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
        margin-top: 8px;
        margin-bottom: 20px;
        resize: none;
        font-size: 14px;
        transition: 0.3s;
    }

    textarea:focus {
        border-color: #14b3b3;
        box-shadow: 0 0 6px rgba(20,179,179,0.4);
    }

    .submit-btn {
        width: 100%;
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        border: none;
        padding: 12px;
        color: white;
        font-size: 16px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: 600;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
    }

    .submit-btn:hover {
        background: #0c6f6f;
    }
</style>

</head>

<body>

<!-- BACK BUTTON -->
<a href="{% url 'view_skill_request' %}" class="back-btn">
    <span class="back-arrow">&#8592;</span>
    Back
</a>

<!-- HOME BUTTON -->
<a href="{% url 'worker_page' %}" class="home-btn">
    <span class="home-icon">&#8962;</span>
    Home
</a>

<div class="wrapper">
    <h2>Send Complaint</h2>

    <form method="post" action="/send_complaint_post">
        {% csrf_token %}

        <label>Complaint</label>
        <textarea name="textarea" placeholder="Enter your complaint here..." required></textarea>

        <button type="submit" class="submit-btn">Submit</button>
    </form>
</div>

</body>
</html>
