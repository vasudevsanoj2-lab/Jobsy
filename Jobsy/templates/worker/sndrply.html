<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Reply to Worker</title>

<style>
    body {
        margin: 0;
        padding: 40px;
        font-family: "Segoe UI", Arial, sans-serif;

        /* ⭐ Same Cream Background */
        background: #f5f0e6;
        background-image:
            radial-gradient(circle at 20% 20%, rgba(255,255,255,0.6) 0, transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(255,255,255,0.5) 0, transparent 45%);
        background-attachment: fixed;
    }

    /* ==============================
       BACK BUTTON – TOP LEFT
    ============================== */
    .back-btn {
        position: fixed;
        top: 25px;
        left: 30px;
        padding: 10px 18px;
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        color: #ffffff;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(15, 143, 143, 0.35);
        transition: 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 1000;
    }

    .back-btn:hover {
        background: linear-gradient(90deg, #0c6f6f, #119797);
        transform: translateY(-2px);
    }

    .back-arrow {
        font-size: 18px;
        line-height: 1;
    }

    .wrapper {
        width: 90%;
        max-width: 480px;
        background: rgba(255, 255, 255, 0.55);
        padding: 28px;
        margin: auto;
        border-radius: 15px;
        backdrop-filter: blur(6px);
        box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.15);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 26px;
        color: #0f8f8f;
        font-weight: 700;
    }

    label {
        font-size: 15px;
        font-weight: 600;
        color: #0f3f3f;
        display: block;
        margin-bottom: 8px;
    }

    textarea {
        width: 100%;
        height: 140px;
        padding: 12px;
        font-size: 14px;
        border: 1.4px solid #b7b7b7;
        border-radius: 10px;
        resize: none;
        background: #fffdf9;
        transition: 0.3s;
    }

    textarea:focus {
        border-color: #0f8f8f;
        box-shadow: 0px 0px 6px rgba(15, 143, 143, 0.45);
        outline: none;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        color: white;
        border: none;
        font-size: 16px;
        font-weight: 600;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.2);
    }

    .btn-submit:hover {
        background: linear-gradient(90deg, #0c6f6f, #119797);
    }
</style>

</head>

<body>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="history.back()">
    <span class="back-arrow">&#8592;</span>
    Back
</button>

<div class="wrapper">

    <h2>Reply</h2>

    <form id="form1" name="form1" method="post" action="/reply_worker_post">

        <label>Enter your reply</label>
        <textarea name="textarea" required></textarea>

        <button type="submit" class="btn-submit">Submit</button>

    </form>

</div>

</body>
</html>
