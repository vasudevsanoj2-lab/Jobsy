<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Update Status</title>

<style>
    body {
        margin: 0;
        padding: 40px;
        font-family: "Segoe UI", Arial, sans-serif;

        /* ⭐ SAME Soft Cream Textured Background */
        background: #f5f0e6;
        background-image:
            radial-gradient(circle at 20% 20%, rgba(255,255,255,0.6) 0, transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(255,255,255,0.5) 0, transparent 45%);
        background-attachment: fixed;
    }

    .wrapper {
        width: 90%;
        max-width: 550px;
        background: rgba(255, 255, 255, 0.5);
        padding: 30px;
        margin: auto;
        border-radius: 15px;
        backdrop-filter: blur(6px);
        box-shadow: 0px 4px 20px rgba(0,0,0,0.15);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 28px;
        color: #0f3f3f;
        font-weight: 700;
    }

    label {
        font-weight: 600;
        font-size: 15px;
        color: #0f3f3f;
    }

    textarea {
        width: 100%;
        height: 130px;
        padding: 12px;
        margin-top: 8px;
        margin-bottom: 20px;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
        resize: none;
        font-size: 14px;
        transition: 0.3s;
    }

    textarea:focus {
        border-color: #14b3b3;
        box-shadow: 0 0 6px rgba(20,179,179,0.4);
    }

    .submit-btn {
        width: 100%;
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        border: none;
        padding: 12px;
        color: white;
        font-size: 16px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: 600;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
    }

    .submit-btn:hover {
        background: #0c6f6f;
    }

    .back-btn {
        display: block;
        width: 160px;
        margin: 20px auto 0;
        background: #d9534f;
        color: white;
        padding: 10px;
        text-align: center;
        border-radius: 10px;
        font-size: 14px;
        text-decoration: none;
        font-weight: 600;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
        transition: 0.3s;
    }

    .back-btn:hover {
        background: #b94744;
    }
</style>

</head>

<body>

<div class="wrapper">
    <h2>Update Status</h2>

    <form id="form1" name="form1" method="post" action="/update_status_post">

        <label>Update</label>
        <textarea name="textarea" placeholder="Enter your update here..."></textarea>

        <button type="submit" class="submit-btn">Submit</button>
    </form>

{#    <a href="/worker_home" class="back-btn">⬅ Go Back</a>#}
</div>

</body>
</html>
