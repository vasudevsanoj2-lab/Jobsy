<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Complaint List</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 40px;
        font-family: "Poppins", sans-serif;

        /* 🌼 Smooth Creamy Background */
        background: #f8f4e8;

        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
    }

    /* ==============================
       BACK BUTTON – TOP LEFT
    ============================== */
    .back-btn {
        position: fixed;
        top: 25px;
        left: 30px;
        padding: 10px 18px;
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        color: #ffffff;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(15, 143, 143, 0.35);
        transition: 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 1000;
    }

    .back-btn:hover {
        background: linear-gradient(90deg, #0d7c7c, #119c9c);
        transform: translateY(-2px);
    }

    .back-arrow {
        font-size: 18px;
        line-height: 1;
    }

    .container {
        width: 95%;
        max-width: 900px;
        background: #ffffff;
        padding: 25px;
        border-radius: 16px;
        box-shadow: 0 6px 25px rgba(0,0,0,0.1);
        border: 1px solid #e6dfd3;
    }

    h2 {
        text-align: center;
        font-size: 26px;
        font-weight: 600;
        color: #4a4a4a;
        margin-bottom: 20px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 12px;
        overflow: hidden;
    }

    /* ⭐ Gradient Table Header */
    th {
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        color: #fff;
        padding: 12px;
        font-size: 15px;
        font-weight: 600;
        text-transform: uppercase;
        text-align: left;
    }

    td {
        padding: 12px;
        font-size: 15px;
        color: #4a4a4a;
        border-bottom: 1px solid #e6dfd3;
        vertical-align: top;
    }

    tr:hover {
        background: #f1ebe0;
        transition: 0.2s ease-in-out;
    }
</style>
</head>

<body>

<!-- BACK BUTTON -->
{#<button class="back-btn" onclick="history.back()">#}
{#    <span class="back-arrow">&#8592;</span>#}
{#    Back#}
{#</button>#}

<a href="{% url 'worker_page' %}" class="back-btn">
    <span class="back-arrow">&#8592;</span>
    Back
</a>


<div class="container">
    <h2>Complaint List</h2>

    <table>
        <tr>
            <th>Username</th>
            <th>Complaint</th>
            <th>Date</th>
            <th>Reply</th>
{#            <th>Action</th>#}
        </tr>

        {% for i in val %}
        <tr>
            <td>{{ i.request.user_id.name }}</td>
            <td>{{ i.complaint }}</td>
            <td>{{ i.date }}</td>
            <td>{{ i.reply }}</td>
{#            <td>#}
{#                {{ i.action }}#}
{#                <a href="/reply_worker/{{ i.id }}">reply</a>#}
{#            </td>#}
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
