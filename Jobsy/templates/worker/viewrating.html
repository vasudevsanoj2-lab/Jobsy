<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>User Reviews</title>

<style>
    body {
        margin: 0;
        padding: 40px;
        font-family: "Segoe UI", Arial, sans-serif;

        background: #f5f0e6;
        background-image:
            radial-gradient(circle at 20% 20%, rgba(255,255,255,0.6) 0, transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(255,255,255,0.5) 0, transparent 45%);
        background-attachment: fixed;
    }

    /* ==============================
       BACK BUTTON â TOP LEFT
    ============================== */
    .back-btn {
        position: fixed;
        top: 25px;
        left: 30px;
        padding: 10px 18px;
        background: #0f8f8f;
        color: #ffffff;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(15, 143, 143, 0.35);
        transition: 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 1000;
    }

    .back-btn:hover {
        background: #0c6f6f;
        transform: translateY(-2px);
    }

    .back-arrow {
        font-size: 18px;
        line-height: 1;
    }

    .wrapper {
        width: 90%;
        max-width: 900px;
        background: rgba(255, 255, 255, 0.45);
        padding: 25px;
        margin: auto;
        border-radius: 18px;
        backdrop-filter: blur(6px);
        box-shadow: 0px 4px 18px rgba(0, 0, 0, 0.15);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
        letter-spacing: 1px;
        font-size: 28px;
        font-weight: 700;
    }

    .filter-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        align-items: center;
    }

    .search-box input {
        padding: 10px 14px;
        width: 240px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        outline: none;
    }

    .filter-drop {
        padding: 10px 14px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
        cursor: pointer;
        color: white;
        background: #0f8f8f;
        box-shadow: 0px 3px 10px rgba(0, 0, 0, 0.2);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #ffffff;
        border-radius: 15px;
        overflow: hidden;
        color: #333;
        font-size: 15px;
        box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.2);
    }

    th {
        padding: 14px 10px;
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        color: #ffffff;
        font-weight: 600;
        text-align: left;
    }

    td {
        padding: 12px 10px;
        border-bottom: 1px solid #ececec;
        vertical-align: middle;
    }

    tr:hover td {
        background: #f2fbfb;
        transition: 0.25s;
    }

    tr:last-child td {
        border-bottom: none;
    }

    .stars {
        font-size: 18px;
        color: #f4c430;
        letter-spacing: 2px;
    }

    .stars .empty {
        color: #ddd;
    }
</style>

<script>
function searchReviews() {
    let input = document.getElementById("searchText").value.toLowerCase();
    let rows = document.querySelectorAll("table tr[data-rating]");

    rows.forEach(row => {
        let text = row.textContent.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
    });
}

function filterByRating(value) {
    let rows = document.querySelectorAll("table tr[data-rating]");

    if (value === "all") {
        rows.forEach(row => row.style.display = "");
        return;
    }

    let rating = parseInt(value);

    rows.forEach(row => {
        let rowRating = parseInt(row.getAttribute("data-rating"));
        row.style.display = (rowRating === rating) ? "" : "none";
    });
}
</script>

</head>

<body>

<!-- BACK BUTTON â WORKER PAGE -->
<a href="{% url 'worker_page' %}" class="back-btn">
    <span class="back-arrow">&#8592;</span>
    Back
</a>

<div class="wrapper">

    <h2>User Reviews</h2>

    <!-- Search & Filter -->
    <div class="filter-row">
        <div class="search-box">
            <input type="text" id="searchText"
                   onkeyup="searchReviews()"
                   placeholder="ð Search reviews..." />
        </div>

        <div>
            <select class="filter-drop" onchange="filterByRating(this.value)">
                <option value="all">Filter by Rating</option>
                <option value="5">5 Stars</option>
                <option value="4">4 Stars</option>
                <option value="3">3 Stars</option>
                <option value="2">2 Stars</option>
                <option value="1">1 Star</option>
            </select>
        </div>
    </div>

    <table>
        <tr>
            <th>Username</th>
            <th>Rating</th>
            <th>Review</th>
            <th>Date</th>
        </tr>

        {% for i in val %}
        <tr data-rating="{{ i.rating }}">
            <td>{{ i.user_id.name }}</td>
            <td>
                <div class="stars">
                    {% for n in "12345" %}
                        {% if forloop.counter <= i.rating %}
                            â
                        {% else %}
                            <span class="empty">â</span>
                        {% endif %}
                    {% endfor %}
                </div>
            </td>
            <td>{{ i.review }}</td>
            <td>{{ i.date }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
