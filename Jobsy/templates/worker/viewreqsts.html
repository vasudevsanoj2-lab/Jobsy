<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Work Requests</title>

<style>
    body {
        margin: 0;
        padding: 40px;
        font-family: "Segoe UI", Arial, sans-serif;

        /* ⭐ Soft Cream Texture Background (Same as Skills Page) */
        background: #f5f0e6;
        background-image:
            radial-gradient(circle at 20% 20%, rgba(255,255,255,0.6) 0, transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(255,255,255,0.5) 0, transparent 45%);
        background-attachment: fixed;
    }

    /* ==============================
       BACK BUTTON – TOP LEFT
    ============================== */
    .back-btn {
        position: fixed;
        top: 25px;
        left: 30px;
        padding: 10px 18px;
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        color: #ffffff;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(15, 143, 143, 0.35);
        transition: 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 1000;
    }

    .back-btn:hover {
        background: linear-gradient(90deg, #0c6f6f, #119797);
        transform: translateY(-2px);
    }

    .back-arrow {
        font-size: 18px;
        line-height: 1;
    }

    .wrapper {
        width: 95%;
        max-width: 900px;
        background: rgba(255, 255, 255, 0.5);
        padding: 30px;
        margin: auto;
        border-radius: 15px;
        backdrop-filter: blur(6px);
        box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.15);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 28px;
        color: #0f3f3f;
        font-weight: 700;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 20px;
        box-shadow: 0px 3px 15px rgba(0,0,0,0.17);
    }

    th {
        padding: 14px;
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        color: white;
        font-size: 15px;
        text-align: left;
        letter-spacing: 0.5px;
    }

    td {
        padding: 12px;
        border-bottom: 1px solid #ececec;
        color: #333;
    }

    tr:hover td {
        background: #f1faf9;
        transition: 0.3s;
    }

    tr:last-child td {
        border-bottom: none;
    }

    /* Status Badge */
    .status {
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        display: inline-block;
        text-transform: capitalize;
        color: #fff;
    }

    .accepted { background: #1a8f6a; }
    .pending  { background: #d2a106; }
    .rejected { background: #d9534f; }
</style>

</head>

<body>

<!-- BACK BUTTON -->
{#<button class="back-btn" onclick="history.back()">#}
{#    <span class="back-arrow">&#8592;</span>#}
{#    Back#}
{#</button>#}

<a href="{% url 'worker_page' %}" class="back-btn">
    <span class="back-arrow">&#8592;</span>
    Back
</a>

<div class="wrapper">
    <h2>Work Requests</h2>

    <table>
        <tr>
            <th>Username</th>
            <th>Work Name</th>
            <th>Details</th>
            <th>Date</th>
            <th>Status</th>
        </tr>

        {% for i in val %}
        <tr>
            <td>{{ i.work_request.user_id.name }}</td>
            <td>{{ i.work_request.work_name }}</td>
            <td>{{ i.work_request.details }}</td>
            <td>{{ i.work_request.date }}</td>
            <td>
                <span class="status
                    {% if i.status == 'accepted' %}accepted
                    {% elif i.status == 'rejected' %}rejected
                    {% else %}pending{% endif %}">
                    {{ i.status }}
                </span>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
