<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Send Reply</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Poppins", sans-serif;
        background: #f8f4e8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #333;
    }

    /* ==============================
       BACK BUTTON – TOP LEFT
    ============================== */
    .back-btn {
        position: fixed;
        top: 25px;
        left: 30px;
        padding: 10px 18px;
        background: #0f8f8f;
        color: #ffffff;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(15,143,143,0.35);
        transition: 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 1000;
    }

    .back-btn:hover {
        background: #0c6f6f;
        transform: translateY(-2px);
    }

    .back-arrow {
        font-size: 18px;
    }

    /* ==============================
       HOME BUTTON – MATCHED STYLE
    ============================== */
    .home-btn {
        position: fixed;
        top: 25px;
        right: 30px;
        padding: 10px 22px;
        background: #0f8f8f;
        color: #ffffff;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(15,143,143,0.35);
        transition: 0.25s;
        display: flex;
        align-items: center;
        gap: 8px;
        letter-spacing: 0.5px;
        z-index: 1000;
    }

    .home-btn:hover {
        background: #0c6f6f;
        transform: translateY(-2px);
    }

    .home-icon {
        font-size: 18px;
        line-height: 1;
    }

    /* ==============================
       FORM CONTAINER
    ============================== */
    .container {
        width: 90%;
        max-width: 500px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        border: 1px solid #e6dfd3;
        overflow: hidden;
    }

    .header {
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        padding: 18px;
        text-align: center;
        color: #ffffff;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 1px;
    }

    .content {
        padding: 25px;
    }

    label {
        font-size: 15px;
        font-weight: 500;
        color: #4a4a4a;
        margin-bottom: 8px;
        display: block;
    }

    textarea {
        width: 100%;
        height: 150px;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #d6ccb8;
        font-size: 15px;
        outline: none;
        resize: none;
        background: #fefcf7;
        font-family: "Poppins", sans-serif;
        transition: 0.25s;
    }

    textarea:focus {
        border-color: #14b3b3;
        box-shadow: 0 0 6px rgba(20,179,179,0.4);
    }

    .submit-btn {
        width: 100%;
        margin-top: 18px;
        padding: 12px 0;
        background: linear-gradient(90deg, #0f8f8f, #14b3b3);
        color: #ffffff;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.25s;
    }

    .submit-btn:hover {
        background: linear-gradient(90deg, #0d7c7c, #119c9c);
    }
</style>
</head>

<body>

<!-- BACK BUTTON -->
<a href="{% url 'incomingcomplaintworker' %}" class="back-btn">
    <span class="back-arrow">&#8592;</span> Back
</a>

<!-- HOME BUTTON -->
<a href="{% url 'worker_page' %}" class="home-btn">
    <span class="home-icon">&#8962;</span> HOME
</a>

<div class="container">
    <div class="header">Send Reply</div>

    <div class="content">
        <form method="post" action="/incomingreplyworker_post">
            {% csrf_token %}

            <label>Your Reply</label>
            <textarea name="textarea" placeholder="Enter your reply..." required></textarea>

            <button type="submit" class="submit-btn">Submit Reply</button>
        </form>
    </div>
</div>

</body>
</html>
