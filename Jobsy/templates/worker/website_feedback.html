<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 40px;
        font-family: "Poppins", sans-serif;
        background: #f5f0e6;
        min-height: 100vh;
    }

    /* ==============================
       BACK BUTTON – TOP LEFT
    ============================== */
    .back-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 10px 16px;
        background: #0f8f8f;
        color: #ffffff;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(15,143,143,0.35);
        transition: 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 1000;
    }

    .back-btn:hover {
        background: #0c6f6f;
        transform: translateY(-2px);
    }

    .back-arrow {
        font-size: 18px;
        line-height: 1;
    }

    /* ==============================
       HEADING
    ============================== */
    .heading {
        text-align: center;
        font-size: 22px;
        font-weight: 800;
        margin-top: 10px;
        margin-bottom: 20px;
        color: #333;
    }

    /* ==============================
       CARD LAYOUT
    ============================== */
    .card-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .feedback-card {
        background: #ffffff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        border-left: 6px solid #4CAF50;
        transition: transform 0.2s ease;
    }

    .feedback-card:hover {
        transform: translateY(-5px);
    }

    .card-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 10px;
        color: #2b2b2b;
    }

    .card-text {
        font-size: 15px;
        margin-bottom: 8px;
        color: #555;
    }

    .card-date {
        font-size: 13px;
        color: #888;
        font-style: italic;
    }
</style>
</head>

<body>

<!-- BACK BUTTON -->
{#<button class="back-btn" onclick="history.back()">#}
{#    <span class="back-arrow">&#8592;</span>#}
{#    Back#}
{#</button>#}
<a href="{% url 'worker_page' %}" class="back-btn">
    <span class="back-arrow">&#8592;</span>
    Back
</a>


<h2 class="heading">Feedback</h2>

<form method="post">
    <div class="card-container">

        {% for i in val %}
        <div class="feedback-card">
            <div class="card-title">{{ i.Login_id.username }}</div>
            <div class="card-text">{{ i.feedback }}</div>
            <div class="card-date">{{ i.date }}</div>
        </div>
        {% endfor %}

    </div>
</form>

</body>
</html>
